<!DOCTYPE html>
<html>
  <head>
    <title>Pesquisa</title>

    <style>
      /* Defina a cor de fundo e o estilo da fonte */
      body {
        background-color: white;
        color: black;
        font-family: Arial, sans-serif;
        text-align: center; /* Centralizar todos os elementos */
      }
      
      /* Centralizar container na página */
      .container {
        margin: 0 auto;
        max-width: 100%; /* Maximizar container horizontalmente */
        text-align: center; /* Redefinir alinhamento de texto para container */
      }
      
      /* Estilo do cabeçalho e rodapé */
      header, footer {
        background-color: white;
        color: black;
        padding: 10px;
        text-align: center; /* Centralizar texto no cabeçalho e rodapé */
      }
      
      /* Estilo do questionário */
      form {
        margin-bottom: 20px;
        text-align: center; /* Centralizar formulário na página */
      }
      
      /* Estilo dos botões */
      button {
        display: block;
        margin: 0 auto;
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid black;
        background-color: #007bff;
        color: #fff;
        font-weight: bold;
      }
      
      button:hover {
        background-color: black;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Pesquisa</h1>
    </header>
    
    <div class="container">
      <!-- Os formulários serão exibidos aqui -->
      <form>
        <!-- Os campos do formulário vão aqui -->
      <p> </p>
        <button id="next-form-button">Próximo questionário</button>
        <p>Clique no botão acima para ir para o próximo formulário.</p>
      <p> </p>
      </form>
    </div>
    
    <footer>
      <p> </p>
      <p>Laboratório de Psicologia Ambiental</p>
      <p>Universidade Federal de Santa Maria</p>
      <p> </p>
    </footer>
    
    <!-- Código JavaScript vai aqui -->
    <script src="script.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>INDEX</title>
    <style>
      /* Defina a cor de fundo e o estilo da fonte */
      body {
        background-color: white;
        color: black;
        font-family: Arial, sans-serif;
        text-align: center; /* Centralizar todos os elementos */
      }
      
      /* Centralizar container na página */
      .container {
        margin: 0 auto;
        max-width: 100%; /* Maximizar container horizontalmente */
        text-align: center; /* Redefinir alinhamento de texto para container */
      }
      
      /* Estilo do cabeçalho e rodapé */
      header, footer {
        background-color: white;
        color: black;
        padding: 10px;
        text-align: center; /* Centralizar texto no cabeçalho e rodapé */
      }
      
      /* Estilo do questionário */
      form {
        margin-bottom: 20px;
        text-align: center; /* Centralizar formulário na página */
      }
      
      /* Estilo dos botões */
      button {
        display: block;
        margin: 0 auto;
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid black;
        background-color: #007bff;
        color: #fff;
        font-weight: bold;
      }
      
      button:hover {
        background-color: black;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>INDEX</h1>
    </header>
    
    <div class="formulario">
<form>
  <div>
    <label for="age">Idade:</label>
    <select id="age" name="age">
      <option value="ate18">até 18 anos</option>
      <option value="18a24">18 a 24 anos</option>
      <option value="25a34">25 a 34 anos</option>
      <option value="35a44">35 a 44 anos</option>
      <option value="45a54">45 a 54 anos</option>
      <option value="55a64">55 a 64 anos</option>
      <option value="65oumais">65 anos ou mais</option>
      <option value="naoinformar">Não gostaria de informar</option>
    </select>
  </div>
  <div>
    <label for="education">Escolaridade:</label>
    <select id="education" name="education">
      <option value="fundamental">Ensino Fundamental</option>
      <option value="medio">Ensino Médio</option>
      <option value="superior">Ensino Superior</option>
      <option value="pos">Pós-graduação</option>
      <option value="naoinformar">Prefiro não informar</option>
    </select>
  </div>
  <div>
    <label for="gender">Gênero:</label>
    <select id="gender" name="gender">
      <option value="masculino">Masculino</option>
      <option value="feminino">Feminino</option>
      <option value="outro">Outro</option>
      <option value="naoinformar">Prefiro não informar</option>
    </select>
  </div>
  <div>
    <label for="profession">Profissão:</label>
    <select id="profession" name="profession">
      <option value="profissionalad">Profissional de Arquitetura, Design, Engenharia ou áreas afins</option>
      <option value="estudantead">Estudante de Arquitetura, Design, Engenharia ou áreas afins</option>
      <option value="outras">Profissional ou estudante de outras áreas</option>
      <option value="naoinformar">Prefiro não informar</option>
    </select>
  </div>
  <div>
    <label for="city">Cidade:</label>
    <input type="text" id="city" name="city">
  </div>
  <div>
    <button type="button" onclick="submitForm()">Enviar</button>
  </div>
</form>
    </div>
    
    <footer>
      <p> </p>
      <p>Laboratório de Psicologia Ambiental</p>
      <p>Universidade Federal de Santa Maria</p>
      <p> </p>
    </footer>
    
    <script>
    function submitForm() {
      // Obtém os valores dos campos do formulário
      const age = document.getElementById("age").value;
      const education = document.getElementById("education").value;
      const gender = document.getElementById("gender").value;
      const profession = document.getElementById("profession").value;
      const city = document.getElementById("city").value;
    
      // Constrói a URL com os parâmetros do formulário
      const url = `pesquisa.html?age=${age}&education=${education}&gender=${gender}&profession=${profession}&city=${city}`;
    
      // Redireciona para a página de pesquisa
      window.location.href = url;
    }

</script>
  </body>
</html>

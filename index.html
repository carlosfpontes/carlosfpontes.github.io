<!DOCTYPE html>
<html>
  <head>
    <title>Random Forms</title>
    <style>
      /* Set background color and font style */
      body {
        background-color: black;
        color: white;
        font-family: Arial, sans-serif;
      }
      
      /* Center container on the page */
      .container {
        margin: 0 auto;
        max-width: 800px;
      }
      
      /* Style header and footer */
      header, footer {
        background-color: #333;
        color: white;
        padding: 10px;
      }
      
      /* Style form */
      form {
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Random Forms</h1>
    </header>
    
    <div class="container">
      <!-- Forms will be displayed here -->
    </div>
    
    <footer>
      <p>Powered by Google Forms</p>
    </footer>
    
    <!-- JavaScript code goes here -->
    <script src="random-forms.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>Random Forms</title>
    <style>
      /* Set background color and font style */
      body {
        background-color: white;
        color: black;
        font-family: Arial, sans-serif;
        text-align: center; /* Center all elements */
      }
      
      /* Center container on the page */
      .container {
        margin: 0 auto;
        max-width: 100%; /* Maximize container horizontally */
        text-align: left; /* Reset text alignment for container */
      }
      
      /* Style header and footer */
      header, footer {
        background-color: black;
        color: white;
        padding: 10px;
        text-align: center; /* Center text in header and footer */
      }
      
      /* Style form */
      form {
        margin-bottom: 20px;
        text-align: center; /* Center form on the page */
      }
      
      /* Style buttons */
      button {
        display: block;
        margin: 0 auto;
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 20px;
        border: 2px solid black;
        background-color: white;
        color: black;
        font-weight: bold;
      }
      
      button:hover {
        background-color: black;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Random Forms</h1>
    </header>
    
    <div class="container">
      <!-- Forms will be displayed here -->
      <form>
        <!-- Form fields go here -->
        <button id="next-form-button">Next Form</button>
        <p>Click the button above to go to the next form.</p>
      </form>
    </div>
    
    <footer>
      <p>Powered by Google Forms</p>
    </footer>
    
    <!-- JavaScript code goes here -->
    <script src="random-forms.js"></script>
  </body>
</html>
